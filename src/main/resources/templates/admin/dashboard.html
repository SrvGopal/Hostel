<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/students">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/notices">Notices</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-1">Welcome, <span th:text="${hostel.full_name}">Admin</span></h4>
    <p class="text-muted mb-4">Hostel Administration Panel</p>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-center p-4">
                <h6 class="text-muted">Total Students</h6>
                <h2 class="text-primary" th:text="${occupied}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4">
                <h6 class="text-muted">Open Complaints</h6>
                <h2 class="text-warning" th:text="${countOpen}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4">
                <h6 class="text-muted">Notices Posted</h6>
                <h2 class="text-success" th:text="${noticeCount}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-4">
                <h6 class="text-muted">Logged in as</h6>
                <h5 class="mt-2" th:text="${hostel.username}">admin</h5>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h5 class="mb-3">Quick Links</h5>
        <div class="d-flex gap-3 flex-wrap">
            <a href="/admin/students" class="btn btn-outline-primary">Manage Students</a>
            <a href="/admin/complaints" class="btn btn-outline-warning">View Complaints</a>
            <a href="/admin/notices" class="btn btn-outline-success">Manage Notices</a>
            <a href="/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
