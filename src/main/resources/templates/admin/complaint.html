<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/students">Students</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/notices">Notices</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3">All Complaints</h4>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card text-center p-3">
                <h6 class="text-muted">Total</h6>
                <h4 th:text="${total}">0</h4>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center p-3">
                <h6 class="text-muted">Open</h6>
                <h4 class="text-warning" th:text="${countOpen}">0</h4>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center p-3">
                <h6 class="text-muted">In Progress</h6>
                <h4 class="text-primary" th:text="${progCount}">0</h4>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center p-3">
                <h6 class="text-muted">Resolved</h6>
                <h4 class="text-success" th:text="${resolvedCount}">0</h4>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <div class="d-flex justify-content-between mb-3">
            <h5>Complaint List</h5>
            <select class="form-select w-auto" id="statusFilter">
                <option value="">All</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="resolved">Resolved</option>
            </select>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="complaintTable">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Category</th>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="complaint, i : ${complaints}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${complaint.student.full_name}"></td>
                    <td th:text="${complaint.categ}"></td>
                    <td th:text="${complaint.title}"></td>
                    <td th:text="${complaint.prio}"></td>
                    <td th:text="${complaint.createdOn}"></td>
                    <td>
                            <span class="badge"
                                  th:classappend="${complaint.status == 'RESOLVED'} ? 'bg-success' : (${complaint.status == 'IN_PROGRESS'} ? 'bg-primary' : 'bg-warning text-dark')"
                                  th:text="${complaint.status}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/complaints/progress/{id}(id=${complaint.id})}"
                           th:if="${complaint.status == 'OPEN'}"
                           class="btn btn-sm btn-primary me-1">In Progress</a>
                        <a th:href="@{/admin/complaints/resolve/{id}(id=${complaint.id})}"
                           th:if="${complaint.status != 'RESOLVED'}"
                           class="btn btn-sm btn-success">Resolve</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(complaints)}">
                    <td colspan="8" class="text-center text-muted">No complaints yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById("statusFilter").addEventListener("change", function() {
        let val = this.value.toLowerCase();
        let rows = document.querySelectorAll("#complaintTable tbody tr");
        rows.forEach(row => {
            row.style.display = (!val || row.innerText.toLowerCase().includes(val)) ? "" : "none";
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
