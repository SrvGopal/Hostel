<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/student/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/student/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/student/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="/student/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-1">Welcome, <span th:text="${hostel.full_name}">Student</span></h4>
    <p class="text-muted mb-4" th:text="${hostel.course + ' - ' + hostel.year + ' Year'}"></p>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center p-4">
                <h6 class="text-muted">Course</h6>
                <h5 th:text="${hostel.course}"></h5>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-4">
                <h6 class="text-muted">Program Level</h6>
                <h5 th:text="${hostel.program_level}"></h5>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-4">
                <h6 class="text-muted">Gender</h6>
                <h5 th:text="${hostel.gender}"></h5>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">Latest Notices</h5>
                <p th:if="${#lists.isEmpty(latestNotices)}" class="text-muted">No notices yet.</p>
                <div th:each="notice : ${latestNotices}" class="border rounded p-3 mb-2">
                    <strong th:text="${notice.title}"></strong>
                    <p class="mb-1 text-muted" style="font-size:14px;" th:text="${notice.message}"></p>
                    <small class="text-muted" th:text="${notice.posted_on}"></small>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="mb-3">Quick Links</h5>
                <div class="d-grid gap-2">
                    <a href="/student/complaints" class="btn btn-outline-primary">My Complaints</a>
                    <a href="/student/profile" class="btn btn-outline-secondary">View Profile</a>
                    <a href="/logout" class="btn btn-outline-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
