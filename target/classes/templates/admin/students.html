<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/students">Students</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/notices">Notices</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3">Manage Students</h4>

    <div class="card p-4 mb-4">
        <h5 class="mb-3">Add New Student</h5>
        <form th:action="@{/admin/students/add}" method="post">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="full_name" placeholder="Full Name" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="username" placeholder="Username" required>
                </div>
                <div class="col-md-4">
                    <input type="email" class="form-control" name="email" placeholder="Email" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="phone" placeholder="Phone">
                </div>
                <div class="col-md-4">
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="course" placeholder="Course (e.g. B.Tech CSE)">
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" name="year" placeholder="Year (e.g. 2nd)">
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="program_level">
                        <option value="UG">UG</option>
                        <option value="PG">PG</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-3">
        <div class="d-flex justify-content-between mb-3">
            <h5>Student List</h5>
            <input type="text" class="form-control w-auto" id="searchInput" placeholder="Search by name...">
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="studentTable">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Year</th>
                    <th>Phone</th>
                    <th>Gender</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student, i : ${students}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${student.full_name}"></td>
                    <td th:text="${student.username}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.course}"></td>
                    <td th:text="${student.year}"></td>
                    <td th:text="${student.phone}"></td>
                    <td th:text="${student.gender}"></td>
                    <td>
                        <a th:href="@{/admin/students/delete/{id}(id=${student.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Delete this student?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="9" class="text-center text-muted">No students found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById("searchInput").addEventListener("keyup", function() {
        let val = this.value.toLowerCase();
        let rows = document.querySelectorAll("#studentTable tbody tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
