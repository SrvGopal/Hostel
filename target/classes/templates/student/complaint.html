<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/student/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/student/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/student/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link active" href="/student/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-1">Complaints</h4>
    <p class="text-muted mb-4">Raise a new complaint or view your complaint history.</p>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="mb-3">Raise New Complaint</h5>
                <form th:action="@{/student/complaints/submit}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" name="category">
                            <option value="ELECTRICAL">Electrical</option>
                            <option value="PLUMBING">Plumbing</option>
                            <option value="FURNITURE">Furniture</option>
                            <option value="INTERNET">Internet</option>
                            <option value="CLEANING">Cleanliness</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" placeholder="Brief title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Priority</label>
                        <select class="form-select" name="priority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="4" name="description" placeholder="Describe the issue"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit</button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="mb-3">My Complaints</h5>
                <p th:if="${#lists.isEmpty(complaints)}" class="text-muted">No complaints raised yet.</p>
                <div th:each="complaint : ${complaints}" class="border-bottom py-2">
                    <strong th:text="${complaint.title}"></strong><br>
                    <small class="text-muted" th:text="${complaint.categ}"></small> |
                    <small class="text-muted" th:text="${complaint.prio}"></small><br>
                    <span class="badge"
                          th:classappend="${complaint.status == 'RESOLVED'} ? 'bg-success' : 'bg-warning text-dark'"
                          th:text="${complaint.status}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
