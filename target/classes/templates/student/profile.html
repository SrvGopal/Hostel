<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/student/dashboard">Hostel Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/student/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/student/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="/student/complaints">Complaints</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-1">My Profile</h4>
    <p class="text-muted mb-4">View and update your details</p>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="mb-3">Current Details</h5>
                <div class="row g-3">
                    <div class="col-6">
                        <label class="text-muted small">Full Name</label>
                        <p class="fw-bold" th:text="${hostel.full_name}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Username</label>
                        <p class="fw-bold" th:text="${hostel.username}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Email</label>
                        <p class="fw-bold" th:text="${hostel.email}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Phone</label>
                        <p class="fw-bold" th:text="${hostel.phone}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Course</label>
                        <p class="fw-bold" th:text="${hostel.course}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Year</label>
                        <p class="fw-bold" th:text="${hostel.year}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Program Level</label>
                        <p class="fw-bold" th:text="${hostel.program_level}"></p>
                    </div>
                    <div class="col-6">
                        <label class="text-muted small">Gender</label>
                        <p class="fw-bold" th:text="${hostel.gender}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="mb-3">Edit Details</h5>
                <form th:action="@{/student/profile/update}" method="post">
                    <div class="mb-2">
                        <label class="form-label small">Email</label>
                        <input type="email" class="form-control" name="email" th:value="${hostel.email}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Phone</label>
                        <input type="text" class="form-control" name="phone" th:value="${hostel.phone}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Course</label>
                        <input type="text" class="form-control" name="course" th:value="${hostel.course}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Year</label>
                        <input type="text" class="form-control" name="year" th:value="${hostel.year}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Gender</label>
                        <select class="form-select" name="gender">
                            <option th:value="${hostel.gender}" th:text="${hostel.gender}" selected></option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Program Level</label>
                        <select class="form-select" name="program_level">
                            <option th:value="${hostel.program_level}" th:text="${hostel.program_level}" selected></option>
                            <option value="UG">UG</option>
                            <option value="PG">PG</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
